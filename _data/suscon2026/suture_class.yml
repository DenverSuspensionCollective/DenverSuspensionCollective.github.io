description: >
  - We are excited to be able to offer an intensive, hands-on workshop designed to give suspension 
    practitioners the foundational knowledge and practical skills needed to respond effectively if 
    suturing is required.
    
  - This class focuses on mastering the most commonly used emergency suture knot and understanding when, 
    why, and how it is applied. Attendees will learn the fundamentals of wound types and healing, 
    appropriate equipment selection, proper placement, and sterile technique, followed by instructor-guided 
    hands-on practice.

  - This course is intended to build confidence, competence, and calm decision-making in high-stakes 
    situations, strengthening the overall safety culture within suspension practice.

  - All registered participants will receive a practice suture kit.

  - Note that the **$25 cost** of this class is in addition to Suscon registration. Registration for Suturing 101 
    will be offered via email to event attendees closer to the event date and will be available on a 
    first-come, first-served basis, **limited to the first 25 registrants**.
